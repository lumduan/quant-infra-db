services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: quant-postgres
    restart: always
    # Postmaster GUCs. The image's PG defaults are far too low for an 8-database TimescaleDB
    # instance: max_worker_processes=8 (default) starved db_crypto's background-worker scheduler,
    # so its retention/compression jobs never ran (38 GB bloat, root 79%, 2026-07-12);
    # shared_buffers=128 MB is the tiny default. shared_preload_libraries is pinned here so this
    # command override can never drop TimescaleDB. (shared_buffers kept conservative at 1 GB because
    # this host runs hot on memory.) See [[project-crypto-db-retention-scheduler]].
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=timescaledb"
      - "-c"
      - "max_worker_processes=16"
      - "-c"
      - "shared_buffers=1GB"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - default

  mongodb:
    image: mongo:latest
    container_name: quant-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db
      - ./init-scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - default

networks:
  default:
    name: quant-network
    external: true
